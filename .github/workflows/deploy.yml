name: Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"

permissions:
  id-token: write
  contents: read

# Ensure only one deploy runs at a time. Overlapping deploys can leave a
# CloudFormation stack wedged in CREATE_IN_PROGRESS, which blocks all later
# deploys. Queue subsequent runs instead of racing; don't cancel an in-flight
# deploy mid-way (that's what leaves stacks stuck).
concurrency:
  group: deploy-aws
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 7200

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK bootstrap
        working-directory: infra
        run: npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      # Deploy ComputeStack first so it stops importing the private subnet IDs
      # from NetworkStack before NetworkStack removes them. Without this,
      # CloudFormation blocks the NetworkStack update because the live
      # ComputeStack still holds a cross-stack import on those exports.
      - name: CDK pre-deploy (ComputeStack)
        working-directory: infra
        run: npx cdk deploy ChatComputeStack --exclusively --require-approval never
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: CDK deploy
        working-directory: infra
        run: npx cdk deploy --all --require-approval never
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
