services:
  chat-api:
    build:
      context: ./services/chat-api
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=us-east-1
      - DYNAMO_TABLE_NAME=chat-service
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - REPOSITORY=dynamo
      - PROVIDER=fake
      - AUTH_MODE=dev
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
    depends_on:
      dynamodb-local:
        condition: service_healthy

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8001:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/shell/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - chat-api
